name: scrape

on:
  schedule:
    - cron: '0 * * * *' # hourly — MMI updates intraday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run scrape
      - name: Commit + push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data
          git diff --cached --quiet || git commit -m "data: scrape $(date -u +%FT%H:%MZ)"
          git push
